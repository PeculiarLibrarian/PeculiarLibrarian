# Future-Proofed Scout Deployment
jobs:
  scout-mission:
    runs-on: ubuntu-22.04 # Pinning the OS version
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Pinned version
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Pinning Python to avoid 3.12+ syntax breaks
          
      - name: Install Hardened Dependencies
        run: |
          pip install --upgrade pip
          pip install rdflib==7.0.0 requests==2.31.0 # Strict pinning
