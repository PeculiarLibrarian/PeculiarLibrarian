name: PADI Global Agent Triage
run-name: "Unit Deployment: ${{ github.event.issue.title || inputs.reason }} [${{ github.actor }}]"

on:
  issues:
    types: [opened, labeled]
  # ⚡ RECOVERY PROTOCOL: Allows manual re-sync of the global fleet
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual redeployment'
        required: true
        default: 'System Recovery/Global Re-sync'
      target_issue:
        description: 'Issue number to target for recovery (Optional)'
        required: false

permissions:
  contents: read
  issues: write

concurrency:
  # Adjusted to handle both issue-based and manual triggers
  group: scout-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  triage:
    # Runs if label is present OR if manually triggered via Recovery Protocol
    if: |
      github.event_name == 'workflow_dispatch' || 
      contains(github.event.issue.labels.*.name, 'agent-review-pending')
    strategy:
      fail-fast: false 
      matrix:
        agent: [AU-9.1, DE-9.2, NL-9.3, UK-9.4, CH-9.5, MENA-9.6]
        include:
          - agent: AU-9.1
            region: "Australia (Sydney/Melbourne/Brisbane)"
            visa_focus: "858 Innovation Visa"
          - agent: DE-9.2
            region: "Germany (Munich/Berlin/Hamburg)"
            visa_focus: "Opportunity Card"
          - agent: NL-9.3
            region: "Netherlands (Amsterdam/Eindhoven/Utrecht)"
            visa_focus: "30% Tax Ruling"
          - agent: UK-9.4
            region: "UK (London/Cambridge/Manchester)"
            visa_focus: "Skilled Worker Visa"
          - agent: CH-9.5
            region: "Switzerland (Zurich/Basel/Geneva)"
            visa_focus: "L/B Permit Quota"
          - agent: MENA-9.6
            region: "MENA (Dubai/Abu Dhabi/Riyadh)"
            visa_focus: "Golden Visa / Premium Residency"

    runs-on: ubuntu-22.04
    steps:
      - name: "Activate Scout ${{ matrix.agent }}"
        uses: actions/github-script@v7.0.1
        env:
          SCOUT_UNIT: ${{ matrix.agent }}
          TARGET_REGION: ${{ matrix.region }}
          VISA_PATH: ${{ matrix.visa_focus }}
          MANUAL_REASON: ${{ inputs.reason }}
          TARGET_ISSUE: ${{ inputs.target_issue }}
        with:
          script: |
            const { SCOUT_UNIT, TARGET_REGION, VISA_PATH, MANUAL_REASON, TARGET_ISSUE } = process.env;
            
            // Determine if we are responding to an issue or a manual system-wide ping
            const issueNumber = TARGET_ISSUE || context.issue.number;
            const title = context.payload.issue ? context.payload.issue.title : "System-Wide Synchronization";
            
            const body = `### 👋 PADI Agent Acknowledgment: Unit ${SCOUT_UNIT}
            
            **Location:** ${TARGET_REGION}
            **Status:** ${MANUAL_REASON ? 'RECOVERY MODE' : 'Active | Handshake Mode'}
            
            **Mission Logic:**
            - **Target:** ${title}
            - **Protocol:** Heuristic Discovery (Depth 2)
            - **Residency Priority:** Tracking **${VISA_PATH}** availability.
            ${MANUAL_REASON ? `- **Recovery Context:** ${MANUAL_REASON}` : ''}
            
            **Architect Notification:** The Bureau in Nairobi has been notified. Cross-border validation is running via PADI-v2.0 standards.`;
